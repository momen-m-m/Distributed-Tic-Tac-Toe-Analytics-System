<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsyncXO | Modern Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <header>
        <h1>Async<span>XO</span></h1>
        <p class="subtitle">Experience the future of Tic-Tac-Toe</p>
    </header>

    <div class="game-card">
        <div class="setup-section">
            <div class="input-group">
                <label>Symbol</label>
                <select id="symbol">
                    <option value="X">X</option>
                    <option value="O">O</option>
                </select>
            </div>
            <div class="input-group">
                <label>Difficulty</label>
                <select id="difficulty">
                    <option value="Easy">Easy</option>
                    <option value="Medium">Medium</option>
                    <option value="Hard">Hard</option>
                </select>
            </div>
            <button id="startBtn" class="primary-btn">Start New Game</button>
        </div>

        <div class="game-info">
            <div id="statusBadge" class="badge">Ready to Play</div>
            <p id="turnText">Configure your game and click Start!</p>
        </div>

        <div id="thinking" class="thinking-loader">
            <div class="dot-pulse"></div>
            <span>AI is thinking</span>
        </div>

        <div class="board-container">
            <div class="board" id="board">
                <!-- Cells generated by JS -->
            </div>
            <div id="overlay" class="overlay">
                <h2 id="winnerText">X Wins!</h2>
                <button onclick="resetUI()">Play Again</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
