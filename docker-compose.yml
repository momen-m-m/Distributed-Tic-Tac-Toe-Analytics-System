services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - tictactoe-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → http://localhost:15672 (guest/guest)
    networks:
      - tictactoe-net

  game-service:
    build: ./game-service
    container_name: game-service
    ports:
      - "8080:8080"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - tictactoe-net

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "8081:8081"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/mydb
      SERVER_PORT: 8081
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - tictactoe-net

volumes:
  mongo-data:

networks:
  tictactoe-net:
    driver: bridge